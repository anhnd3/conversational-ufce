  expected_output:
    task: extract_cf_request
    status: complete
    cf_request:
      Income: 30
      CCAvg: 0.8
      Family: 2
      Education: 1
      Mortgage: 0
      CDAccount: 0
      Online: 1
      SecuritiesAccount: 0
      CreditCard: 0
    missing_fields: []
