- case_id: B07
  group: B
  description: Underspecified qualitative wording that still includes some exact fields
  input: I want online banking and a CD account, and my family size is 3. My mortgage
    should stay low.
  expected_output:
    task: extract_cf_request
    status: needs_clarification
