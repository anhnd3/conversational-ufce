  expected_output:
    task: extract_cf_request
    status: complete
    cf_request:
      Income: 40.0
      CCAvg: 1.5
      Family: 3
      Education: 2
      Mortgage: 80.0
      CDAccount: 1
      Online: 1
      SecuritiesAccount: 1
      CreditCard: 1
    missing_fields: []
    conflicts: []
    notes: []
- case_id: A06
  group: A
  description: Full extraction with concise semicolon-separated style
