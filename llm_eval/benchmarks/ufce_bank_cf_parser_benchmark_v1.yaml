    notes: []
- case_id: C03
  group: C
  description: Qualitative numeric ambiguity
  input: I need high income, low mortgage, and online banking yes.
  expected_output:
    task: extract_cf_request
    status: needs_clarification
    cf_request:
      Online: 1
    missing_fields:
    - Income
    - CCAvg
    - Family
    - Education
    - Mortgage
    - CDAccount
    - SecuritiesAccount
    - CreditCard
    conflicts: []
