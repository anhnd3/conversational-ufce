    - Education is mentioned semantically, but the benchmark requires numeric category
      code only
- case_id: C01
  group: C
  description: Direct contradiction in binary field
  input: I want CDAccount yes and no at the same time. Set income to 40 and online
    to yes.
  expected_output:
    task: extract_cf_request
    status: conflict
    cf_request:
      Income: 40
      Online: 1
    missing_fields:
    - CCAvg
    - Family
    - Education
    - Mortgage
    - SecuritiesAccount
    - CreditCard
    conflicts:
    - CDAccount is specified as both 1 and 0
    notes: []
- case_id: C02
  group: C
  description: Ambiguous alternative numeric value
  input: Set family size to 2 or maybe 3, income to 55, and credit card yes.
  expected_output:
    task: extract_cf_request
    status: needs_clarification
    cf_request:
      Income: 55
      CreditCard: 1
    missing_fields:
    - CCAvg
    - Family
    - Education
    - Mortgage
    - CDAccount
    - Online
    - SecuritiesAccount
    conflicts:
