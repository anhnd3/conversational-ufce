benchmark_name: ufce_bank_cf_parser_v1
description: Bank-only benchmark for evaluating LLM ability to extract a canonical
  counterfactual-request JSON structure from natural-language input.
target_cf_fields:
- name: Income
  type: float
  description: Target income value
- name: CCAvg
  type: float
  description: Average credit card spending
- name: Family
  type: int
  description: Family size
- name: Education
  type: int
  description: Education category code
- name: Mortgage
  type: float
  description: Mortgage value
- name: CDAccount
  type: binary
  description: 1=yes, 0=no
- name: Online
  type: binary
  description: 1=yes, 0=no
- name: SecuritiesAccount
  type: binary
  description: 1=yes, 0=no
- name: CreditCard
  type: binary
  description: 1=yes, 0=no
output_contract:
  task: extract_cf_request
  status_enum:
  - complete
  - partial
  - needs_clarification
  - conflict
  rules:
  - Return only fields explicitly inferable from the input.
  - Do not invent missing values.
  - Use canonical field names exactly as defined.
  - Binary fields must be 0 or 1.
  - Education must be a numeric category code when provided.
  - missing_fields must list canonical field names that are not specified but would
    be needed for a complete CF request.
  - conflicts must describe contradictory or invalid instructions briefly.
  - notes may contain short normalization notes if needed; otherwise return an empty
    list.
cases:
- case_id: A01
  group: A
  description: Direct full specification, canonical order
  input: My target profile is Income 40, CCAvg 1.5, Family 3, Education 2, Mortgage
    80, CDAccount yes, Online yes, SecuritiesAccount yes, and CreditCard yes.
  expected_output:
    task: extract_cf_request
    status: complete
    cf_request:
      Income: 40
      CCAvg: 1.5
      Family: 3
      Education: 2
      Mortgage: 80
      CDAccount: 1
      Online: 1
      SecuritiesAccount: 1
      CreditCard: 1
    missing_fields: []
    conflicts: []
    notes: []
- case_id: A02
  group: A
  description: Full extraction with natural phrasing and reordered fields
  input: 'I want a mortgage of 80, family size 3, income 40, education level 2, average
    card spending 1.5, and I want all four services enabled: CD account, online banking,
    securities account, and credit card.'
  expected_output:
    task: extract_cf_request
    status: complete
    cf_request:
      Income: 40
      CCAvg: 1.5
      Family: 3
      Education: 2
      Mortgage: 80
      CDAccount: 1
      Online: 1
      SecuritiesAccount: 1
      CreditCard: 1
    missing_fields: []
    conflicts: []
    notes: []
- case_id: A03
  group: A
  description: Full extraction with negative binary values
  input: Please set Income to 55 and CCAvg to 2.2. Family should be 4, Education 3,
    Mortgage 120. I do not want a CD account, I do not use online banking, I do not
    have a securities account, and I do not want a credit card.
  expected_output:
    task: extract_cf_request
    status: complete
    cf_request:
      Income: 55
      CCAvg: 2.2
      Family: 4
      Education: 3
      Mortgage: 120
      CDAccount: 0
      Online: 0
      SecuritiesAccount: 0
      CreditCard: 0
    missing_fields: []
    conflicts: []
    notes: []
- case_id: A04
  group: A
  description: Full extraction with mixed yes/no binary values
  input: 'Target outcome: Income 65, CCAvg 3.0, Family 2, Education 1, Mortgage 0.
    Keep CD account yes, Online yes, SecuritiesAccount no, CreditCard yes.'
  expected_output:
    task: extract_cf_request
    status: complete
    cf_request:
      Income: 65
      CCAvg: 3.0
      Family: 2
      Education: 1
      Mortgage: 0
      CDAccount: 1
      Online: 1
      SecuritiesAccount: 0
      CreditCard: 1
    missing_fields: []
    conflicts: []
    notes: []
- case_id: A05
  group: A
  description: Full extraction with decimal normalization
